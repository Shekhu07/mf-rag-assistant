name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set Git identity for history rewriting
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Initialize Git LFS
          git lfs install
          
          # Switch out of detached HEAD to local main branch
          git checkout -B main
          
          # Migrate local history to LFS pointers for binary files
          git lfs migrate import --include="*.pdf,*.png" --yes
          
          # Force push the LFS-migrated branch to Hugging Face Space
          git push --force https://oauth2:$HF_TOKEN@huggingface.co/spaces/Abhishek292000/artha-ai main
