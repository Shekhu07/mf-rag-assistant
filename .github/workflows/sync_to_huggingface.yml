name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'Shekhu07' and 'mf-rag-assistant' with your actual Hugging Face username and Space name if different
          git push --force https://huggingface.co/spaces/Shekhu07/mf-rag-assistant main
