name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set Git identity
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Create a new, history-free branch named "deploy"
          git checkout --orphan deploy
          
          # Remove binary files to bypass Hugging Face's size and binary hooks
          rm -f assets/logo.png
          find data -name "*.pdf" -type f -delete
          
          # Stage all remaining files
          git add .
          
          # Commit the clean state
          git commit -m "Deploy clean app without binary history"
          
          # Force push the clean branch to main on Hugging Face Space
          git push --force https://oauth2:$HF_TOKEN@huggingface.co/spaces/Abhishek292000/artha-ai deploy:main
