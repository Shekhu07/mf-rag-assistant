server {
    listen 80;
    server_name localhost;

    # Increase maximum client body size (useful if uploading factsheets via UI in future)
    client_max_body_size 20M;

    location / {
        # proxy_pass to the docker service name 'web' on port 8501
        proxy_pass http://web:8501;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (CRITICAL for Streamlit state and user interaction)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Adjust timeout to prevent proxy from dropping idle chatbot connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
