version: '3.8'

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    # Bind Streamlit to container port 8501 (not exposed directly to host machine)
    expose:
      - "8501"
    environment:
      # Inject the Gemini API key from the host env or parent shell context
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  nginx:
    image: nginx:alpine
    # Expose port 80 to the host machine for standard HTTP access
    ports:
      - "80:80"
    volumes:
      # Mount the Nginx config as read-only configuration inside the container
      - ./nginx_streamlit.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: always
